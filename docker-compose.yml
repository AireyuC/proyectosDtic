services:
  # 1. Backend Django (App)
  backend:
    build: ./uagrm_bot_backend
    container_name: backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./uagrm_bot_backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ./uagrm_bot_backend/.env

  # 1.5 Frontend React
  frontend:
    build:
      context: ./uagrm_bot_frontend
      dockerfile: Dockerfile
    container_name: frontend
    volumes:
      - ./uagrm_bot_frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

  # 2. Base de Datos (Con pgvector)
  db:
    image: pgvector/pgvector:pg16
    container_name: db
    restart: always
    environment:
      - POSTGRES_DB=uagrm_bot_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2.5 Redis (Message Broker para Celery)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  # 2.6 Celery Worker
  celery:
    build: ./uagrm_bot_backend
    container_name: celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./uagrm_bot_backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./uagrm_bot_backend/.env

  # 3. n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
